on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'LICENSE'
      - '.github/*.md'
      - '.github/FUNDING.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

name: Run Tests
jobs:
  test:
    runs-on: ubuntu-latest
    environment: integration
    permissions:
      id-token: write
      contents: read
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod

    - name: Install modules and dsc
      shell: pwsh
      run: |
        $requiredResource = @{
          Pester = @{
            Version = '5.7.1'
            Repository = 'PSGallery'
            TrustRepository = $true
          }
          PSDSC = @{
            Version = '1.3.1'
            Repository = 'PSGallery'
            TrustRepository = $true
          }
        }
        Install-PSResource -RequiredResource $requiredResource -Scope CurrentUser -TrustRepository

        Install-DscExe -IncludePrerelease -Verbose

    - name: Azure login
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        enable-AzPSSession: true

    - name: Build and run tests
      uses: azure/powershell@v2
      with:
        azPSVersion: latest
        inlineScript: ./build.ps1 -RunTests -Verbose
