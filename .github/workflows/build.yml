on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'LICENSE'
      - '.github/*.md'
      - '.github/FUNDING.yml'
      - 'tests/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

name: Build Artifacts
jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      with:
        fetch-depth: 0

    - name: Install Go
      uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
      with:
        go-version-file: go.mod

    - name: Determine version
      id: version
      run: |
        SHORT_SHA="$(git rev-parse --short HEAD)"
        VERSION="0.0.0-${SHORT_SHA}"
        echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

    - name: Build
      env:
        VERSION: ${{ steps.version.outputs.version }}
        CGO_ENABLED: "0"
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
      run: |
        BINARY="dsc-databricks"
        if [ "${GOOS}" = "windows" ]; then
          BINARY="dsc-databricks.exe"
        fi

        go build -trimpath -ldflags="-s -w" -o "${BINARY}" ./cmd

        ARCHIVE_BASE="dsc_databricks_${VERSION}_${GOOS}_${GOARCH}"

        tar -czf "${ARCHIVE_BASE}.tar.gz" "${BINARY}"
        zip -q "${ARCHIVE_BASE}.zip" "${BINARY}"

    - name: Upload tar.gz
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: dsc_databricks_${{ steps.version.outputs.version }}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz
        path: dsc_databricks_${{ steps.version.outputs.version }}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz
        retention-days: 7

    - name: Upload zip
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: dsc_databricks_${{ steps.version.outputs.version }}_${{ matrix.goos }}_${{ matrix.goarch }}.zip
        path: dsc_databricks_${{ steps.version.outputs.version }}_${{ matrix.goos }}_${{ matrix.goarch }}.zip
        retention-days: 7

  checksums:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
      with:
        path: artifacts

    - name: Determine version
      id: version
      run: |
        # Extract version from any artifact name
        FIRST=$(ls artifacts/ | head -n1)
        VERSION=$(echo "${FIRST}" | sed 's/dsc_databricks_\(.*\)_.*/\1/')
        echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

    - name: Generate checksums
      env:
        VERSION: ${{ steps.version.outputs.version }}
      run: |
        mkdir -p dist
        # Each artifact is in its own directory; collect the files
        for dir in artifacts/*/; do
          cp "${dir}"* dist/
        done
        cd dist
        sha256sum * > "dsc_databricks_${VERSION}_SHA256SUMS"

    - name: Upload checksums
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: dsc_databricks_${{ steps.version.outputs.version }}_SHA256SUMS
        path: dist/dsc_databricks_${{ steps.version.outputs.version }}_SHA256SUMS
        retention-days: 7
